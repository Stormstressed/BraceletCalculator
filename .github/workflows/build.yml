name: Build Portable JavaFX App

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn -B clean package

      - name: Install JavaFX modules
        run: mvn -B dependency:copy-dependencies -DincludeScope=runtime

      - name: Create runtime image with jlink
        run: |
          rm -rf runtime
          jlink \
            --add-modules $(jdeps --print-module-deps --ignore-missing-deps target/*.jar) \
            --output runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2
        shell: bash

      - name: Prepare portable app
        run: |
          mkdir portable
          cp target/*.jar portable/
          cp -r runtime portable/
        shell: bash

      - name: Create launcher scripts
        run: |
          echo '#!/bin/bash' > portable/run.sh
          echo './runtime/bin/java -jar *.jar' >> portable/run.sh
          chmod +x portable/run.sh

          cat << 'EOF' > portable/run.bat
          runtime\bin\java.exe -jar *.jar
          EOF
        shell: bash

      # Linux + Windows ZIP handling
      - name: Zip portable app (Linux)
        if: runner.os == 'Linux'
        run: zip -r app-linux.zip portable
        shell: bash

      - name: Zip portable app (Windows)
        if: runner.os == 'Windows'
        run: powershell Compress-Archive -Path portable -DestinationPath app-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: |
            app-linux.zip
            app-windows.zip

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
