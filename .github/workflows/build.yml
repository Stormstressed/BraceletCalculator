name: Build Windows Portable App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download JavaFX SDK (Windows)
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.9/openjfx-21.0.9_windows-x64_bin-sdk.zip
          tar -xf javafx.zip
          ren javafx-sdk-21.0.9 javafx-sdk

      - name: Download JavaFX jmods (Windows)
        run: |
          curl -L -o javafx-jmods.zip https://download2.gluonhq.com/openjfx/21.0.9/openjfx-21.0.9_windows-x64_bin-jmods.zip
          tar -xf javafx-jmods.zip
          ren javafx-jmods-21.0.9 javafx-jmods

      - name: Build with Maven (shaded JAR)
        run: mvn -B package

      - name: Create portable app with jpackage
        run: >
          jpackage --type app-image --name BraceletCalculator
          --input target
          --main-jar BraceletCalculator.jar
          --main-class base.BraceletApp
          --module-path "$env:JAVA_HOME\jmods;javafx-jmods"
          --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,java.base,jdk.crypto.ec
          --icon src/main/resources/icon.ico
          --dest dist

      - name: Upload portable app to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BraceletCalculator/**
